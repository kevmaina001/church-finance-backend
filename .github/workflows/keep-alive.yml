name: Keep Render backend awake

# Pings the backend /health endpoint on a schedule so Render's free tier does not
# spin the service down (and, if it ever has spun down, this wakes it back up).
# The in-app self-ping in server.js keeps it warm between runs; this is the external
# backstop that can also wake a fully-slept process.

on:
  schedule:
    - cron: '*/10 * * * *' # every 10 minutes (GitHub cron is best-effort; may run late)
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health (cold start can take ~30s)
        run: |
          URL="https://church-finance-backend.onrender.com/health"
          echo "Pinging $URL"
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "$URL" || echo "000")
            echo "Attempt $i -> HTTP $code"
            [ "$code" = "200" ] && exit 0
            sleep 15
          done
          echo "Did not get 200 after retries (best-effort keep-alive, not failing the job)."
